<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes — HubAtendimento</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12131a; --ink-2:#1b1d27; --paper:#f2efe9; --paper-dim:#c9c6bf;
    --coral:#ff6b4a; --green:#5ee69b; --violet:#9a9eff; --line:rgba(242,239,233,0.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--ink); color:var(--paper); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; }
  h1{ font-family:'Archivo',sans-serif; font-weight:800; }

  #loading-screen{ min-height:100vh; display:flex; align-items:center; justify-content:center; }
  #login-screen{ display:none; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; gap:18px; padding:24px; }
  #login-screen.visivel{ display:flex; }
  #login-screen input{ background:var(--ink-2); border:1px solid var(--line); border-radius:8px; padding:12px 16px; color:var(--paper); font-size:1rem; width:260px; text-align:center; }
  #login-screen button{ background:var(--coral); color:var(--ink); border:none; border-radius:8px; padding:12px 24px; font-weight:600; cursor:pointer; }
  #login-error{ color:var(--coral); font-size:0.85rem; min-height:18px; }

  #panel{ display:none; max-width:880px; margin:0 auto; padding:40px 24px 100px; }

  .topnav{ display:flex; gap:4px; margin-bottom:32px; border-bottom:1px solid var(--line); }
  .topnav a{ color:var(--paper-dim); text-decoration:none; font-size:0.88rem; font-weight:500; padding:10px 16px; border-bottom:2px solid transparent; }
  .topnav a:hover{ color:var(--paper); }
  .topnav a.ativo{ color:var(--paper); border-bottom-color:var(--coral); font-weight:600; }

  .panel-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:28px; flex-wrap:wrap; gap:10px; }

  /* Busca */
  #busca{ background:var(--ink-2); border:1px solid var(--line); border-radius:8px; padding:10px 14px; color:var(--paper); font-size:0.92rem; width:100%; max-width:320px; margin-bottom:20px; }

  /* Cards de cliente */
  .cliente{
    background:var(--ink-2); border:1px solid var(--line); border-radius:12px;
    padding:18px 20px; margin-bottom:12px;
    display:grid; grid-template-columns:48px 1fr auto; gap:16px; align-items:start;
  }
  .cliente-foto{
    width:48px; height:48px; border-radius:50%; background:var(--ink);
    border:1px solid var(--line); object-fit:cover; flex-shrink:0;
  }
  .cliente-foto-placeholder{
    width:48px; height:48px; border-radius:50%; background:var(--ink);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:1.2rem; color:var(--paper-dim); flex-shrink:0;
  }
  .instagram-link{
    display:inline-flex; align-items:center; gap:4px; font-size:0.78rem;
    color:var(--violet); text-decoration:none; margin-bottom:6px;
  }
  .instagram-link:hover{ text-decoration:underline; }
  .cliente-nome{ font-weight:600; font-size:1rem; margin-bottom:4px; }
  .cliente-info{ display:flex; gap:18px; flex-wrap:wrap; font-size:0.82rem; color:var(--paper-dim); margin-bottom:10px; }
  .cliente-info span strong{ color:var(--paper); font-weight:500; }
  .cliente-stats{ display:flex; gap:14px; flex-wrap:wrap; }
  .stat{ font-size:0.78rem; color:var(--paper-dim); }
  .stat strong{ color:var(--paper); font-size:0.9rem; font-weight:700; display:block; }
  .cliente-acoes{ display:flex; flex-direction:column; gap:8px; align-items:flex-end; }
  .btn{ border:1px solid var(--line); background:transparent; color:var(--paper); font-size:0.8rem; padding:7px 14px; border-radius:7px; cursor:pointer; white-space:nowrap; }
  .btn:hover{ opacity:0.8; }
  .btn.conversa{ border-color:var(--violet); color:var(--violet); }
  .btn.reiniciar{ border-color:var(--paper-dim); color:var(--paper-dim); }
  .ultimo-contato{ font-size:0.75rem; color:var(--paper-dim); font-family:'IBM Plex Mono',monospace; margin-top:4px; }

  .empty-state{ text-align:center; color:var(--paper-dim); padding:60px 20px; }

  /* Modal */
  #modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; padding:24px; }
  #modal-overlay.aberto{ display:flex; }
  #modal-box{ background:var(--ink-2); border:1px solid var(--line); border-radius:14px; width:100%; max-width:540px; max-height:80vh; display:flex; flex-direction:column; }
  #modal-header{ display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line); }
  #modal-header h3{ font-family:'Archivo',sans-serif; font-size:1rem; }
  #modal-fechar{ background:transparent; border:none; color:var(--paper-dim); font-size:1.3rem; cursor:pointer; padding:4px 8px; }
  #modal-body{ overflow-y:auto; padding:20px; flex:1; }
  .msg{ margin-bottom:14px; }
  .msg-role{ font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .msg-role.user{ color:var(--violet); }
  .msg-role.model{ color:var(--green); }
  .msg-texto{ font-size:0.88rem; line-height:1.5; color:var(--paper-dim); white-space:pre-wrap; }

  @media(max-width:560px){
    .cliente{ grid-template-columns:1fr; }
    .cliente-acoes{ flex-direction:row; align-items:flex-start; }
  }
</style>
</head>
<body>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-header">
      <h3 id="modal-titulo">Conversa</h3>
      <button id="modal-fechar">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="loading-screen"></div>
<div id="login-screen">
  <h1>Clientes</h1>
  <input type="password" id="senha-input" placeholder="Senha de acesso" autocomplete="off">
  <button id="login-btn">Entrar</button>
  <div id="login-error"></div>
</div>

<div id="panel">
  <nav class="topnav">
    <a href="/pedidos">Pedidos</a>
    <a href="/agenda">Agenda</a>
    <a href="/clientes" class="ativo">Clientes</a>
    <a href="/pacotes">Pacotes</a>
    <a href="/relatorios">Relatórios</a>
    <a href="/cadastro">Cadastro</a>
  </nav>
  <div class="panel-head">
    <h1>Clientes</h1>
  </div>
  <input type="text" id="busca" placeholder="Buscar por nome...">
  <div id="lista-clientes"></div>
</div>

<script>
  const CHAVE_STORAGE = 'hubatendimento_senha';
  let senhaAtual = '';
  let todosClientes = [];
  const negocioId = new URLSearchParams(window.location.search).get('negocio_id') || 'default';
  const paramNegocio = negocioId !== 'default' ? `?negocio_id=${negocioId}` : '';

  document.querySelectorAll('.topnav a').forEach(a => {
    const base = a.getAttribute('href').split('?')[0];
    a.href = base + paramNegocio;
  });

  document.getElementById('login-btn').addEventListener('click', tentarLogin);
  document.getElementById('senha-input').addEventListener('keydown', e => { if (e.key === 'Enter') tentarLogin(); });
  document.getElementById('busca').addEventListener('input', e => filtrar(e.target.value));
  document.getElementById('modal-fechar').addEventListener('click', fecharModal);
  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) fecharModal(); });

  async function tentarLogin(senhaForcada) {
    const senha = senhaForcada ?? document.getElementById('senha-input').value;
    const resp = await fetch(`/api/clientes?negocio_id=${negocioId}&senha=` + encodeURIComponent(senha));
    if (!resp.ok) {
      localStorage.removeItem(CHAVE_STORAGE + ':' + negocioId);
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('login-screen').classList.add('visivel');
      document.getElementById('login-error').textContent = senhaForcada ? '' : 'Senha incorreta.';
      return;
    }
    senhaAtual = senha;
    localStorage.setItem(CHAVE_STORAGE + ':' + negocioId, senha);
    const data = await resp.json();
    todosClientes = data.clientes || [];
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').classList.remove('visivel');
    document.getElementById('panel').style.display = 'block';
    renderizar(todosClientes);
  }

  function filtrar(termo) {
    if (!termo.trim()) { renderizar(todosClientes); return; }
    const t = termo.toLowerCase();
    renderizar(todosClientes.filter(c => (c.nome || '').toLowerCase().includes(t)));
  }

  function renderizar(clientes) {
    const container = document.getElementById('lista-clientes');
    if (!clientes.length) {
      container.innerHTML = '<div class="empty-state">Nenhum cliente encontrado ainda. Os clientes aparecem aqui quando interagem com o bot.</div>';
      return;
    }

    container.innerHTML = clientes.map(c => {
      const ultimoContato = c.ultimoContato
        ? new Date(c.ultimoContato).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
        : '-';
      const totalGasto = c.totalGasto > 0 ? 'R$ ' + Number(c.totalGasto).toFixed(2).replace('.', ',') : '-';

      const fotoHtml = c.instagramFoto
        ? `<img class="cliente-foto" src="${escapeHtml(c.instagramFoto)}" alt="Foto de perfil" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="cliente-foto-placeholder" style="display:none">👤</div>`
        : `<div class="cliente-foto-placeholder">👤</div>`;

      const instagramHtml = c.instagramUsername
        ? `<a class="instagram-link" href="https://instagram.com/${c.instagramUsername}" target="_blank" rel="noopener">@${escapeHtml(c.instagramUsername)}</a>`
        : '';

      const nomeEntrega = c.nomeDelivery && c.nomeDelivery !== c.nome
        ? `<span style="font-size:0.78rem;color:var(--paper-dim);margin-left:6px;">(${escapeHtml(c.nomeDelivery)})</span>`
        : '';

      return `
        <div class="cliente">
          <div>${fotoHtml}</div>
          <div>
            <div class="cliente-nome">${escapeHtml(c.nome || 'Desconhecido')}${nomeEntrega}</div>
            ${instagramHtml}
            <div class="cliente-info">
              ${c.endereco ? `<span><strong>Endereço:</strong> ${escapeHtml(c.endereco)}</span>` : ''}
              ${c.pagamento ? `<span><strong>Pagamento:</strong> ${escapeHtml(c.pagamento)}</span>` : ''}
            </div>
            <div class="cliente-stats">
              <div class="stat"><strong>${c.totalPedidos}</strong>pedido(s)</div>
              ${c.totalLeads ? `<div class="stat"><strong>${c.totalLeads}</strong>lead(s)</div>` : ''}
              <div class="stat"><strong>${totalGasto}</strong>total gasto</div>
            </div>
            <div class="ultimo-contato">Último contato: ${ultimoContato}</div>
          </div>
          <div class="cliente-acoes">
            <button class="btn conversa" onclick="verConversa('${c.subscriberId}', '${escapeHtml(c.nome || 'Cliente')}')">Ver conversa</button>
            <button class="btn reiniciar" onclick="reiniciarConversa('${c.subscriberId}', '${escapeHtml(c.nome || 'Cliente')}')">Reiniciar conversa</button>
          </div>
        </div>`;
    }).join('');
  }

  async function reiniciarConversa(subscriberId, nome) {
    if (!confirm(`Reiniciar a conversa com ${nome}? A IA vai esquecer o histórico atual dessa pessoa (pedidos salvos não são afetados).`)) return;
    try {
      const resp = await fetch('/api/pedido-acao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ senha: senhaAtual, negocio_id: negocioId, acao: 'resetar_conversa', subscriberId }),
      });
      if (!resp.ok) { alert('Não foi possível reiniciar a conversa.'); return; }
      alert(`Conversa com ${nome} reiniciada.`);
    } catch (err) {
      alert('Erro ao reiniciar a conversa.');
    }
  }

  async function verConversa(subscriberId, nome) {
    document.getElementById('modal-titulo').textContent = `Conversa com ${nome}`;
    document.getElementById('modal-body').innerHTML = '<div style="color:var(--paper-dim);font-size:0.9rem;padding:10px 0;">Carregando...</div>';
    document.getElementById('modal-overlay').classList.add('aberto');

    try {
      const resp = await fetch(
        `/api/historico?negocio_id=${negocioId}&senha=${encodeURIComponent(senhaAtual)}&subscriber_id=${encodeURIComponent(subscriberId)}`
      );
      if (!resp.ok) { document.getElementById('modal-body').innerHTML = '<div style="color:var(--coral)">Erro ao carregar.</div>'; return; }

      const data = await resp.json();
      renderizarHistorico(data.historico || []);
    } catch (err) {
      document.getElementById('modal-body').innerHTML = '<div style="color:var(--coral)">Erro ao carregar.</div>';
    }
  }

  function renderizarHistorico(msgs) {
    if (!msgs.length) {
      document.getElementById('modal-body').innerHTML = '<div style="color:var(--paper-dim);font-size:0.9rem;">Nenhuma mensagem encontrada.</div>';
      return;
    }
    document.getElementById('modal-body').innerHTML = msgs.map(m => {
      const isUser = m.role === 'user';
      const texto = (m.parts?.[0]?.text || '')
        .replace(/###PEDIDO###[\s\S]*?###FIM###/g, '')
        .replace(/###LEAD###[\s\S]*?###FIM###/g, '')
        .replace(/###CANCELAR###/g, '')
        .replace(/###CHAMAR_HUMANO###/g, '')
        .trim();
      if (!texto) return '';
      return `
        <div class="msg">
          <div class="msg-role ${isUser ? 'user' : 'model'}">${isUser ? 'Cliente' : 'Bot'}</div>
          <div class="msg-texto">${escapeHtml(texto)}</div>
        </div>`;
    }).join('');
  }

  function fecharModal() {
    document.getElementById('modal-overlay').classList.remove('aberto');
  }

  function escapeHtml(str) {
    const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
  }

  const senhaSalva = localStorage.getItem(CHAVE_STORAGE + ':' + negocioId);
  if (senhaSalva) { tentarLogin(senhaSalva); }
  else { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('login-screen').classList.add('visivel'); }
</script>
</body>
</html>

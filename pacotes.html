<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacotes — HubAtendimento</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#12131a; --ink-2:#1b1d27; --paper:#f2efe9; --paper-dim:#c9c6bf; --coral:#ff6b4a; --green:#5ee69b; --gold:#f5c842; --line:rgba(242,239,233,0.12); }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--ink); color:var(--paper); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; }
  h1,h2,h3{ font-family:'Archivo',sans-serif; }
  label{ display:block; font-size:0.82rem; color:var(--paper-dim); margin-bottom:5px; }
  input,textarea,select{ width:100%; background:var(--ink-2); border:1px solid var(--line); border-radius:8px; padding:10px 14px; color:var(--paper); font-size:0.92rem; font-family:inherit; }
  textarea{ resize:vertical; min-height:80px; }
  button{ cursor:pointer; font-family:inherit; }

  #loading-screen{ min-height:100vh; display:flex; align-items:center; justify-content:center; }
  #login-screen{ display:none; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; gap:18px; padding:24px; }
  #login-screen.visivel{ display:flex; }
  #login-screen input{ width:260px; text-align:center; }
  #login-screen button{ background:var(--coral); color:var(--ink); border:none; border-radius:8px; padding:12px 24px; font-weight:600; }
  #login-error{ color:var(--coral); font-size:0.85rem; min-height:18px; }

  #panel{ display:none; max-width:820px; margin:0 auto; padding:40px 24px 100px; }

  .topnav{ display:flex; gap:4px; margin-bottom:32px; border-bottom:1px solid var(--line); }
  .topnav a{ color:var(--paper-dim); text-decoration:none; font-size:0.88rem; font-weight:500; padding:10px 16px; border-bottom:2px solid transparent; }
  .topnav a:hover{ color:var(--paper); }
  .topnav a.ativo{ color:var(--paper); border-bottom-color:var(--coral); font-weight:600; }

  .panel-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
  .btn-primary{ background:var(--coral); color:var(--ink); border:none; border-radius:8px; padding:10px 20px; font-weight:600; font-size:0.9rem; }
  .btn-secondary{ background:transparent; border:1px solid var(--line); color:var(--paper-dim); border-radius:8px; padding:8px 16px; font-size:0.85rem; }
  .btn-danger{ background:transparent; border:1px solid var(--coral); color:var(--coral); border-radius:8px; padding:8px 16px; font-size:0.85rem; }

  /* LISTA DE PACOTES */
  .pacote-card{ background:var(--ink-2); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; gap:16px; }
  .pacote-info h3{ font-size:1rem; margin-bottom:4px; }
  .pacote-info .meta{ font-size:0.8rem; color:var(--paper-dim); }
  .pacote-acoes{ display:flex; gap:8px; flex-shrink:0; }
  .link-pacote{ font-family:'IBM Plex Mono',monospace; font-size:0.75rem; color:var(--coral); text-decoration:none; display:block; margin-top:4px; }
  .link-pacote:hover{ text-decoration:underline; }

  /* FORMULÁRIO */
  #form-pacote{ display:none; background:var(--ink-2); border:1px solid var(--line); border-radius:14px; padding:28px; margin-bottom:24px; }
  #form-pacote h2{ margin-bottom:22px; font-size:1.1rem; }
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid-3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  .field{ margin-bottom:14px; }
  .section-label{ font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--paper-dim); margin:20px 0 12px; border-top:1px solid var(--line); padding-top:16px; }
  .checkbox-row{ display:flex; align-items:center; gap:8px; font-size:0.88rem; }
  .checkbox-row input[type="checkbox"]{ width:auto; accent-color:var(--coral); }
  .form-acoes{ display:flex; gap:10px; margin-top:20px; }
  #save-status{ font-size:0.82rem; color:var(--green); min-height:18px; margin-top:8px; }
  #save-error{ font-size:0.82rem; color:var(--coral); min-height:18px; }

  .empty-state{ text-align:center; color:var(--paper-dim); padding:60px 20px; font-size:0.95rem; }

  @media(max-width:560px){ .grid-2,.grid-3{ grid-template-columns:1fr; } .pacote-card{ flex-direction:column; align-items:flex-start; } }
</style>
</head>
<body>
<div id="loading-screen"></div>
<div id="login-screen">
  <h1>Pacotes</h1>
  <input type="password" id="senha-input" placeholder="Senha de acesso" autocomplete="off">
  <button id="login-btn">Entrar</button>
  <div id="login-error"></div>
</div>

<div id="panel">
  <nav class="topnav">
    <a href="/pedidos">Pedidos</a>
    <a href="/agenda">Agenda</a>
    <a href="/clientes">Clientes</a>
    <a href="/pacotes" class="ativo">Pacotes</a>
    <a href="/relatorios">Relatórios</a>
    <a href="/cadastro">Cadastro</a>
  </nav>
  <div class="panel-head">
    <h1>Pacotes de Viagem</h1>
    <button class="btn-primary" id="btn-novo">+ Novo pacote</button>
  </div>

  <!-- Formulário de criação/edição -->
  <div id="form-pacote">
    <h2 id="form-titulo">Novo pacote</h2>

    <div class="field"><label>Destino (ex: Buenos Aires)</label><input type="text" id="f-destino" placeholder="Buenos Aires, Argentina"></div>
    <div class="grid-2">
      <div class="field"><label>Duração (ex: 5 dias / 4 noites)</label><input type="text" id="f-duracao" placeholder="5 dias / 4 noites"></div>
      <div class="field"><label>Mês/período (ex: Agosto de 2026)</label><input type="text" id="f-periodo" placeholder="Agosto de 2026"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Número de pessoas</label><input type="number" id="f-pessoas" min="1" value="2" placeholder="2"></div>
      <div class="field"><label>Tipo de acomodação (ex: quarto duplo)</label><input type="text" id="f-acomodacao" placeholder="Quarto duplo"></div>
    </div>

    <div class="section-label">✈️ Voo — Ida</div>
    <div class="grid-2">
      <div class="field"><label>Data de ida</label><input type="text" id="f-voo-ida-data" placeholder="15/08/2026"></div>
      <div class="field"><label>Horário de ida</label><input type="text" id="f-voo-ida-hora" placeholder="06:30"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Companhia</label><input type="text" id="f-voo-ida-cia" placeholder="LATAM"></div>
      <div class="field"><label>Aeroporto de saída (ex: GRU — Guarulhos)</label><input type="text" id="f-voo-ida-aeroporto" placeholder="GRU — Guarulhos"></div>
    </div>

    <div class="section-label">✈️ Voo — Volta</div>
    <div class="grid-2">
      <div class="field"><label>Data de volta</label><input type="text" id="f-voo-volta-data" placeholder="19/08/2026"></div>
      <div class="field"><label>Horário de volta</label><input type="text" id="f-voo-volta-hora" placeholder="22:10"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Companhia</label><input type="text" id="f-voo-volta-cia" placeholder="Aerolíneas Argentinas"></div>
      <div class="field"><label>Aeroporto de chegada (ex: GRU — Guarulhos)</label><input type="text" id="f-voo-volta-aeroporto" placeholder="GRU — Guarulhos"></div>
    </div>

    <div class="section-label">🏨 Hotel</div>
    <div class="field"><label>Nome do hotel</label><input type="text" id="f-hotel-nome" placeholder="Hotel Madero Buenos Aires"></div>
    <div class="field"><label>Descrição</label><textarea id="f-hotel-desc" placeholder="Localizado no bairro Puerto Madero, a 10 minutos do centro histórico..."></textarea></div>
    <div class="field"><label>Foto 1 (URL)</label><input type="text" id="f-foto1" placeholder="https://..."></div>
    <div class="field"><label>Foto 2 (URL)</label><input type="text" id="f-foto2" placeholder="https://..."></div>
    <div class="field"><label>Foto 3 (URL)</label><input type="text" id="f-foto3" placeholder="https://..."></div>

    <div class="section-label">📦 O que está incluído</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:8px;">
      <label class="checkbox-row"><input type="checkbox" id="f-passagem" checked> Passagem aérea</label>
      <label class="checkbox-row"><input type="checkbox" id="f-hotel" checked> Hotel</label>
      <label class="checkbox-row"><input type="checkbox" id="f-cafe"> Café da manhã</label>
    </div>

    <div class="section-label">💰 Preço e checkout</div>
    <div class="grid-3">
      <div class="field"><label>Preço total (R$)</label><input type="number" step="0.01" id="f-preco" placeholder="2870"></div>
      <div class="field"><label>Número de parcelas</label><input type="number" id="f-parcelas" value="10" min="1" max="24"></div>
      <div class="field"><label>Desconto à vista (%)</label><input type="number" id="f-desconto" value="15" min="0" max="50"></div>
    </div>
    <div class="field"><label>Link de checkout (Mercado Pago)</label><input type="text" id="f-checkout" placeholder="https://mpago.la/..."></div>

    <div class="form-acoes">
      <button class="btn-primary" id="btn-salvar">Salvar pacote</button>
      <button class="btn-secondary" id="btn-cancelar">Cancelar</button>
    </div>
    <div id="save-status"></div>
    <div id="save-error"></div>
    <input type="hidden" id="f-id">
  </div>

  <!-- Lista de pacotes -->
  <div id="lista-pacotes"></div>
</div>

<script>
  const CHAVE = 'hubatendimento_senha';
  let senhaAtual = '';
  const negocioId = new URLSearchParams(window.location.search).get('negocio_id') || 'default';
  const paramNegocio = negocioId !== 'default' ? '?negocio_id=' + negocioId : '';

  document.querySelectorAll('.topnav a').forEach(a => {
    const base = a.getAttribute('href').split('?')[0];
    a.href = base + paramNegocio;
  });

  document.getElementById('login-btn').addEventListener('click', tentarLogin);
  document.getElementById('senha-input').addEventListener('keydown', e => { if (e.key === 'Enter') tentarLogin(); });
  document.getElementById('btn-novo').addEventListener('click', () => abrirForm(null));
  document.getElementById('btn-cancelar').addEventListener('click', fecharForm);
  document.getElementById('btn-salvar').addEventListener('click', salvar);

  async function tentarLogin(senhaForcada) {
    const senha = senhaForcada ?? document.getElementById('senha-input').value;
    const resp = await fetch('/api/pacote?negocio_id=' + negocioId + '&senha=' + encodeURIComponent(senha));
    if (!resp.ok) {
      localStorage.removeItem(CHAVE + ':' + negocioId);
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('login-screen').classList.add('visivel');
      document.getElementById('login-error').textContent = senhaForcada ? '' : 'Senha incorreta.';
      return;
    }
    senhaAtual = senha;
    localStorage.setItem(CHAVE + ':' + negocioId, senha);
    const data = await resp.json();
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').classList.remove('visivel');
    document.getElementById('panel').style.display = 'block';
    renderizarLista(data.pacotes || []);
  }

  function renderizarLista(pacotes) {
    const lista = document.getElementById('lista-pacotes');
    if (!pacotes.length) {
      lista.innerHTML = '<div class="empty-state">Nenhum pacote cadastrado ainda. Clique em "Novo pacote" para criar.</div>';
      return;
    }
    lista.innerHTML = pacotes.map(p => {
      const url = 'https://hubatendimento.com.br/pacote?id=' + p.id;
      return '<div class="pacote-card">'
        + '<div class="pacote-info">'
        + '<h3>' + esc(p.destino || 'Sem nome') + '</h3>'
        + '<div class="meta">' + esc(p.duracao || '') + (p.periodo ? ' · ' + esc(p.periodo) : '') + (p.preco ? ' · R$ ' + fmt(p.preco) : '') + '</div>'
        + '<a class="link-pacote" href="' + url + '" target="_blank">' + url + '</a>'
        + '</div>'
        + '<div class="pacote-acoes">'
        + '<button class="btn-secondary" onclick="copiarLink(\'' + p.id + '\')">Copiar link</button>'
        + '<button class="btn-secondary" onclick="editarPacote(' + JSON.stringify(JSON.stringify(p)) + ')">Editar</button>'
        + '<button class="btn-danger" onclick="excluirPacote(\'' + p.id + '\', \'' + esc(p.destino || '') + '\')">Excluir</button>'
        + '</div></div>';
    }).join('');
  }

  function abrirForm(pacote) {
    const isEdicao = !!pacote;
    document.getElementById('form-titulo').textContent = isEdicao ? 'Editar pacote' : 'Novo pacote';
    document.getElementById('f-id').value = pacote?.id || '';
    document.getElementById('f-destino').value = pacote?.destino || '';
    document.getElementById('f-duracao').value = pacote?.duracao || '';
    document.getElementById('f-periodo').value = pacote?.periodo || '';
    document.getElementById('f-pessoas').value = pacote?.pessoas || 2;
    document.getElementById('f-acomodacao').value = pacote?.acomodacao || '';
    document.getElementById('f-voo-ida-data').value = pacote?.vooIdaData || '';
    document.getElementById('f-voo-ida-hora').value = pacote?.vooIdaHora || '';
    document.getElementById('f-voo-ida-cia').value = pacote?.vooIdaCia || '';
    document.getElementById('f-voo-ida-aeroporto').value = pacote?.vooIdaAeroporto || '';
    document.getElementById('f-voo-volta-data').value = pacote?.vooVoltaData || '';
    document.getElementById('f-voo-volta-hora').value = pacote?.vooVoltaHora || '';
    document.getElementById('f-voo-volta-cia').value = pacote?.vooVoltaCia || '';
    document.getElementById('f-voo-volta-aeroporto').value = pacote?.vooVoltaAeroporto || '';
    document.getElementById('f-hotel-nome').value = pacote?.hotelNome || '';
    document.getElementById('f-hotel-desc').value = pacote?.hotelDescricao || '';
    document.getElementById('f-foto1').value = pacote?.foto1 || '';
    document.getElementById('f-foto2').value = pacote?.foto2 || '';
    document.getElementById('f-foto3').value = pacote?.foto3 || '';
    document.getElementById('f-passagem').checked = pacote?.incluiPassagem !== false;
    document.getElementById('f-hotel').checked = pacote?.incluiHotel !== false;
    document.getElementById('f-cafe').checked = !!pacote?.incluiCafe;
    document.getElementById('f-preco').value = pacote?.preco || '';
    document.getElementById('f-parcelas').value = pacote?.parcelas || 10;
    document.getElementById('f-desconto').value = pacote?.descontoAvista || 15;
    document.getElementById('f-checkout').value = pacote?.linkCheckout || '';
    document.getElementById('save-status').textContent = '';
    document.getElementById('save-error').textContent = '';
    document.getElementById('form-pacote').style.display = 'block';
    document.getElementById('form-pacote').scrollIntoView({ behavior: 'smooth' });
  }

  function fecharForm() {
    document.getElementById('form-pacote').style.display = 'none';
  }

  function editarPacote(jsonStr) {
    abrirForm(JSON.parse(jsonStr));
  }

  async function salvar() {
    const pacote = {
      id: document.getElementById('f-id').value || undefined,
      destino: document.getElementById('f-destino').value.trim(),
      duracao: document.getElementById('f-duracao').value.trim(),
      periodo: document.getElementById('f-periodo').value.trim(),
      pessoas: parseInt(document.getElementById('f-pessoas').value) || 2,
      acomodacao: document.getElementById('f-acomodacao').value.trim(),
      vooIdaData: document.getElementById('f-voo-ida-data').value.trim(),
      vooIdaHora: document.getElementById('f-voo-ida-hora').value.trim(),
      vooIdaCia: document.getElementById('f-voo-ida-cia').value.trim(),
      vooIdaAeroporto: document.getElementById('f-voo-ida-aeroporto').value.trim(),
      vooVoltaData: document.getElementById('f-voo-volta-data').value.trim(),
      vooVoltaHora: document.getElementById('f-voo-volta-hora').value.trim(),
      vooVoltaCia: document.getElementById('f-voo-volta-cia').value.trim(),
      vooVoltaAeroporto: document.getElementById('f-voo-volta-aeroporto').value.trim(),
      hotelNome: document.getElementById('f-hotel-nome').value.trim(),
      hotelDescricao: document.getElementById('f-hotel-desc').value.trim(),
      foto1: document.getElementById('f-foto1').value.trim(),
      foto2: document.getElementById('f-foto2').value.trim(),
      foto3: document.getElementById('f-foto3').value.trim(),
      incluiPassagem: document.getElementById('f-passagem').checked,
      incluiHotel: document.getElementById('f-hotel').checked,
      incluiCafe: document.getElementById('f-cafe').checked,
      preco: parseFloat(document.getElementById('f-preco').value) || 0,
      parcelas: parseInt(document.getElementById('f-parcelas').value) || 10,
      descontoAvista: parseInt(document.getElementById('f-desconto').value) || 0,
      linkCheckout: document.getElementById('f-checkout').value.trim(),
    };

    if (!pacote.destino) {
      document.getElementById('save-error').textContent = 'O destino é obrigatório.';
      return;
    }

    document.getElementById('save-status').textContent = 'Salvando...';
    document.getElementById('save-error').textContent = '';

    const resp = await fetch('/api/pacote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ negocio_id: negocioId, senha: senhaAtual, pacote }),
    });

    if (!resp.ok) {
      document.getElementById('save-status').textContent = '';
      document.getElementById('save-error').textContent = 'Erro ao salvar.';
      return;
    }

    const data = await resp.json();
    document.getElementById('save-status').textContent = 'Salvo! Link: hubatendimento.com.br/pacote?id=' + data.id;
    document.getElementById('f-id').value = data.id;

    // Atualiza a lista
    const listResp = await fetch('/api/pacote?negocio_id=' + negocioId + '&senha=' + encodeURIComponent(senhaAtual));
    const listData = await listResp.json();
    renderizarLista(listData.pacotes || []);
  }

  async function excluirPacote(id, destino) {
    if (!confirm('Excluir o pacote "' + destino + '"? Essa ação não pode ser desfeita.')) return;
    await fetch('/api/pacote?id=' + id + '&negocio_id=' + negocioId + '&senha=' + encodeURIComponent(senhaAtual), { method: 'DELETE' });
    const listResp = await fetch('/api/pacote?negocio_id=' + negocioId + '&senha=' + encodeURIComponent(senhaAtual));
    const listData = await listResp.json();
    renderizarLista(listData.pacotes || []);
  }

  function copiarLink(id) {
    navigator.clipboard.writeText('https://hubatendimento.com.br/pacote?id=' + id);
    alert('Link copiado!');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function fmt(n) { return Number(n).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }

  const senhaSalva = localStorage.getItem(CHAVE + ':' + negocioId);
  if (senhaSalva) { tentarLogin(senhaSalva); }
  else { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('login-screen').classList.add('visivel'); }
</script>
</body>
</html>

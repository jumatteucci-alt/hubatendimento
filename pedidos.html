<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Pedidos — HubAtendimento</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12131a; --ink-2:#1b1d27; --paper:#f2efe9; --paper-dim:#c9c6bf;
    --coral:#ff6b4a; --green:#5ee69b; --violet:#9a9eff; --line: rgba(242,239,233,0.12);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--ink); color:var(--paper);
    font-family:'IBM Plex Sans', sans-serif; min-height:100vh;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  h1{ font-family:'Archivo', sans-serif; font-weight:800; }

  /* TELA DE SENHA */
  #login-screen{
    display:none;
    min-height:100vh; align-items:center; justify-content:center;
    flex-direction:column; gap:18px; padding:24px;
  }
  #login-screen.visivel{ display:flex; }
  #loading-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  #login-screen input{
    background:var(--ink-2); border:1px solid var(--line); border-radius:8px;
    padding:12px 16px; color:var(--paper); font-size:1rem; width:260px;
    text-align:center;
  }
  #login-screen input:focus-visible{ outline:2px solid var(--coral); }
  #login-screen button{
    background:var(--coral); color:var(--ink); border:none; border-radius:8px;
    padding:12px 24px; font-weight:600; cursor:pointer; font-size:0.95rem;
  }
  #login-error{ color:var(--coral); font-size:0.85rem; min-height:18px; }

  /* PAINEL */
  .topnav{ display:flex; gap:4px; margin-bottom:32px; border-bottom:1px solid var(--line); padding-bottom:0; }
  .topnav a{
    color:var(--paper-dim); text-decoration:none; font-size:0.88rem; font-weight:500;
    padding:10px 16px; border-bottom:2px solid transparent; transition:color .15s;
  }
  .topnav a:hover{ color:var(--paper); }
  .topnav a.ativo{ color:var(--paper); border-bottom-color:var(--coral); font-weight:600; }

  #panel{ display:none; max-width:880px; margin:0 auto; padding:40px 24px 80px; }
  .panel-head{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:28px; flex-wrap:wrap; gap:10px;
  }
  .status-line{ color:var(--paper-dim); font-size:0.85rem; display:flex; align-items:center; gap:8px; }
  .live-dot{
    width:7px; height:7px; border-radius:50%; background:var(--green);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(94,230,155,.5);} 70%{box-shadow:0 0 0 7px rgba(94,230,155,0);} 100%{box-shadow:0 0 0 0 rgba(94,230,155,0);} }

  .pedido{
    background:var(--ink-2); border:1px solid var(--line); border-radius:12px;
    padding:18px 20px; margin-bottom:14px;
  }
  .pedido.cancelado, .pedido.finalizado{ opacity:0.55; }
  .badge{
    font-size:0.72rem; font-weight:600; padding:3px 9px; border-radius:999px; margin-left:8px;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .badge-cancelado{ background:rgba(255,107,74,0.15); color:var(--coral); }
  .badge-entrega{ background:rgba(94,230,155,0.15); color:var(--green); }
  .badge-finalizado{ background:rgba(201,198,191,0.15); color:var(--paper-dim); }
  .badge-lead{ background:rgba(154,158,255,0.15); color:var(--violet); }
  .pedido-acoes{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .btn-acao{
    border:1px solid var(--line); background:transparent; color:var(--paper);
    font-size:0.82rem; padding:7px 14px; border-radius:7px; cursor:pointer;
  }
  .btn-acao.entrega{ border-color:var(--green); color:var(--green); }
  .btn-acao.finalizar{ border-color:var(--paper-dim); color:var(--paper-dim); }
  .btn-acao.cancelar{ border-color:var(--coral); color:var(--coral); }
  .btn-acao.excluir{ border-color:rgba(255,107,74,0.4); color:rgba(255,107,74,0.6); }
  .btn-acao.conversa{ border-color:var(--violet); color:var(--violet); }
  .btn-acao:hover{ opacity:0.8; }

  /* Modal de histórico */
  #modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; padding:24px; }
  #modal-overlay.aberto{ display:flex; }
  #modal-box{ background:var(--ink-2); border:1px solid var(--line); border-radius:14px; width:100%; max-width:540px; max-height:80vh; display:flex; flex-direction:column; }
  #modal-header{ display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--line); }
  #modal-header h3{ font-family:'Archivo',sans-serif; font-size:1rem; }
  #modal-fechar{ background:transparent; border:none; color:var(--paper-dim); font-size:1.3rem; cursor:pointer; padding:4px 8px; }
  #modal-body{ overflow-y:auto; padding:20px; flex:1; }
  .msg{ margin-bottom:14px; }
  .msg-role{ font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
  .msg-role.user{ color:var(--violet); }
  .msg-role.model{ color:var(--green); }
  .msg-texto{ font-size:0.88rem; line-height:1.5; color:var(--paper-dim); white-space:pre-wrap; }
  .pedido-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
  .pedido-nome{ font-weight:600; font-size:1.05rem; }
  .pedido-total{ color:var(--coral); font-weight:700; font-size:1.1rem; }
  .pedido-itens{ color:var(--paper-dim); font-size:0.92rem; margin-bottom:8px; }
  .pedido-meta{ display:flex; gap:18px; flex-wrap:wrap; font-size:0.85rem; color:var(--paper-dim); }
  .pedido-meta span strong{ color:var(--paper); font-weight:500; }
  .pedido-hora{ font-size:0.78rem; color:var(--paper-dim); margin-top:8px; }

  .empty-state{
    text-align:center; color:var(--paper-dim); padding:60px 20px; font-size:0.95rem;
  }

  .banner{
    border-radius:12px; padding:14px 18px; margin-bottom:14px; font-size:0.88rem;
  }
  .banner-alerta{ background:rgba(255,107,74,0.1); border:1px solid rgba(255,107,74,0.35); }
  .banner-erro{ background:rgba(255,107,74,0.06); border:1px solid var(--line); color:var(--paper-dim); }
  .banner-titulo{ font-weight:600; color:var(--paper); margin-bottom:4px; display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .banner button{
    border:1px solid var(--coral); background:transparent; color:var(--coral);
    font-size:0.78rem; padding:5px 12px; border-radius:7px; cursor:pointer; white-space:nowrap;
  }
  .btn-acao.reset{ border-color:var(--paper-dim); color:var(--paper-dim); }
</style>
</head>
<body>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-header">
      <h3 id="modal-titulo">Conversa</h3>
      <button id="modal-fechar">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="loading-screen"></div>
<div id="login-screen">
  <h1>Painel de Pedidos</h1>
  <input type="password" id="senha-input" placeholder="Senha de acesso" autocomplete="off">
  <button id="login-btn">Entrar</button>
  <div id="login-error"></div>
</div>

<div id="panel">
  <nav class="topnav">
    <a href="/pedidos" class="ativo">Pedidos</a>
    <a href="/agenda">Agenda</a>
    <a href="/relatorios">Relatórios</a>
    <a href="/cadastro">Cadastro</a>
  </nav>
  <div class="panel-head">
    <h1>Pedidos</h1>
    <div class="status-line"><span class="live-dot"></span> atualizando automaticamente</div>
  </div>
  <div id="banners"></div>
  <div id="lista-pedidos"></div>
</div>

<script>
  const CHAVE_STORAGE = 'hubatendimento_senha';
  let senhaAtual = '';

  // Detecta negocio_id da URL ou usa 'default'
  const negocioId = new URLSearchParams(window.location.search).get('negocio_id') || 'default';
  const paramNegocio = negocioId !== 'default' ? `?negocio_id=${negocioId}` : '';

  // Atualiza links de navegação com o negocio_id atual
  document.querySelectorAll('.topnav a').forEach(a => {
    const base = a.getAttribute('href').split('?')[0];
    a.href = base + paramNegocio;
  });

  document.getElementById('login-btn').addEventListener('click', tentarLogin);
  document.getElementById('senha-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tentarLogin();
  });

  async function tentarLogin(senhaForcada) {
    const senha = senhaForcada ?? document.getElementById('senha-input').value;
    const ok = await buscarPedidos(senha);
    if (ok) {
      senhaAtual = senha;
      localStorage.setItem(CHAVE_STORAGE + ':' + negocioId, senha);
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('login-screen').classList.remove('visivel');
      document.getElementById('panel').style.display = 'block';
      setInterval(() => buscarPedidos(senhaAtual), 8000);
    } else {
      localStorage.removeItem(CHAVE_STORAGE + ':' + negocioId);
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('login-screen').classList.add('visivel');
      document.getElementById('login-error').textContent = senhaForcada ? '' : 'Senha incorreta.';
    }
  }

  // Enquanto verifica se já existe uma senha salva, mostra só a tela neutra de carregamento
  const senhaSalva = localStorage.getItem(CHAVE_STORAGE + ':' + negocioId);
  if (senhaSalva) {
    tentarLogin(senhaSalva);
  } else {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').classList.add('visivel');
  }

  async function buscarPedidos(senha) {
    try {
      const resp = await fetch(`/api/pedidos?negocio_id=${negocioId}&senha=` + encodeURIComponent(senha));
      if (!resp.ok) return false;
      const data = await resp.json();
      renderizar(data.pedidos || []);
      renderizarBanners(data.alertas || [], data.erros || [], data.avisoToken || null);
      return true;
    } catch (err) {
      console.error(err);
      return false;
    }
  }

  function renderizarBanners(alertas, erros, avisoToken) {
    const container = document.getElementById('banners');
    let html = '';

    if (avisoToken) {
      html += `
        <div class="banner banner-alerta">
          <div class="banner-titulo"><span>⚠️ Token do Instagram expirando em breve</span></div>
          <div>${escapeHtml(avisoToken)}</div>
        </div>`;
    }

    alertas.forEach(a => {
      html += `
        <div class="banner banner-alerta">
          <div class="banner-titulo">
            <span>🔔 ${escapeHtml(a.nome || 'Cliente')} pediu pra falar com alguém</span>
            <button onclick="resolverAlerta('${a.id}')">Marcar como resolvido</button>
          </div>
          <div>"${escapeHtml(a.mensagem || '')}"</div>
        </div>`;
    });

    if (erros.length > 0) {
      const ultimo = erros[0];
      html += `
        <div class="banner banner-erro">
          <div class="banner-titulo"><span>⚠️ A IA teve ${erros.length} erro(s) recente(s)</span></div>
          <div>Último: "${escapeHtml(ultimo.detalhe || '').slice(0, 140)}" — ${new Date(ultimo.criadoEm).toLocaleString('pt-BR')}</div>
        </div>`;
    }

    container.innerHTML = html;
  }

  async function resolverAlerta(alertaId) {
    try {
      await fetch('/api/pedido-acao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ senha: senhaAtual, negocio_id: negocioId, acao: 'resolver_alerta', alertaId }),
      });
      buscarPedidos(senhaAtual);
    } catch (err) {
      console.error(err);
    }
  }

  function renderizar(pedidos) {
    const container = document.getElementById('lista-pedidos');

    // Se forem agendamentos com data marcada, mostra em ordem cronológica (próximos primeiro)
    const ordenados = [...pedidos].sort((a, b) => {
      if (a.dataHoraISO && b.dataHoraISO) return new Date(a.dataHoraISO) - new Date(b.dataHoraISO);
      if (a.dataHoraISO) return -1;
      if (b.dataHoraISO) return 1;
      return 0;
    });

    if (ordenados.length === 0) {
      container.innerHTML = '<div class="empty-state">Nenhum pedido ainda. Quando um cliente fechar um pedido pelo Instagram, ele aparece aqui automaticamente.</div>';
      return;
    }

    container.innerHTML = ordenados.map(p => {
      const itens = (p.itens || []).join(', ');
      const total = p.total != null ? 'R$ ' + Number(p.total).toFixed(2).replace('.', ',') : '-';
      const hora = p.criadoEm ? new Date(p.criadoEm).toLocaleString('pt-BR') : '';
      const agendamento = p.tipo === 'agendamento';
      const produtoDigital = p.tipo === 'produto_digital';
      const labelCampo2 = agendamento ? 'Data/horário desejado' : produtoDigital ? 'Contato' : 'Endereço';
      const labelAcaoEntrega = agendamento ? 'Confirmar agendamento' : produtoDigital ? 'Confirmar venda' : 'Saiu para entrega';
      const msgAcaoEntrega = agendamento
        ? 'Seu agendamento foi confirmado! ✅'
        : 'Seu pedido saiu para entrega! 🛵 Chega em breve.';

      let badge = '';
      if (p.status === 'lead') badge = '<span class="badge badge-lead">Lead, ainda não comprou</span>';
      else if (p.status === 'cancelado') badge = '<span class="badge badge-cancelado">Cancelado</span>';
      else if (p.status === 'em_entrega') badge = `<span class="badge badge-entrega">${agendamento ? 'Confirmado' : 'Em entrega'}</span>`;
      else if (p.status === 'finalizado') badge = '<span class="badge badge-finalizado">Finalizado</span>';

      let acoes = '';
      if (p.status === 'lead') {
        acoes = `
          <div class="pedido-acoes">
            <button class="btn-acao conversa" onclick="verConversa('${p.subscriberId}', '${escapeHtml(p.nome || 'Cliente')}')">Ver conversa</button>
            <button class="btn-acao cancelar" onclick="executarAcao('${p.id}', 'cancelar')">Cancelar</button>
            <button class="btn-acao reset" onclick="resetarConversa('${p.subscriberId}')">Reiniciar</button>
            <button class="btn-acao excluir" onclick="confirmarExclusao('${p.id}')">Excluir</button>
          </div>`;
      } else if (p.status === 'ativo') {
        acoes = `
          <div class="pedido-acoes">
            <button class="btn-acao entrega" onclick="executarAcao('${p.id}', 'entregando')">${labelAcaoEntrega}</button>
            <button class="btn-acao finalizar" onclick="executarAcao('${p.id}', 'finalizar')">Finalizar</button>
            <button class="btn-acao conversa" onclick="verConversa('${p.subscriberId}', '${escapeHtml(p.nome || 'Cliente')}')">Ver conversa</button>
            <button class="btn-acao cancelar" onclick="executarAcao('${p.id}', 'cancelar')">Cancelar</button>
            <button class="btn-acao reset" onclick="resetarConversa('${p.subscriberId}')">Reiniciar</button>
            <button class="btn-acao excluir" onclick="confirmarExclusao('${p.id}')">Excluir</button>
          </div>`;
      } else if (p.status === 'em_entrega') {
        acoes = `
          <div class="pedido-acoes">
            <button class="btn-acao finalizar" onclick="executarAcao('${p.id}', 'finalizar')">Finalizar</button>
            <button class="btn-acao conversa" onclick="verConversa('${p.subscriberId}', '${escapeHtml(p.nome || 'Cliente')}')">Ver conversa</button>
            <button class="btn-acao reset" onclick="resetarConversa('${p.subscriberId}')">Reiniciar</button>
            <button class="btn-acao excluir" onclick="confirmarExclusao('${p.id}')">Excluir</button>
          </div>`;
      } else {
        acoes = `
          <div class="pedido-acoes">
            <button class="btn-acao conversa" onclick="verConversa('${p.subscriberId}', '${escapeHtml(p.nome || 'Cliente')}')">Ver conversa</button>
            <button class="btn-acao excluir" onclick="confirmarExclusao('${p.id}')">Excluir</button>
          </div>`;
      }

      let metaHtml = '';
      if (produtoDigital && p.dados) {
        metaHtml = Object.entries(p.dados)
          .map(([k, v]) => `<span><strong>${escapeHtml(k)}:</strong> ${escapeHtml(String(v))}</span>`)
          .join('');
      } else {
        metaHtml = `
          <span><strong>${labelCampo2}:</strong> ${escapeHtml(p.endereco || '-')}</span>
          <span><strong>Pagamento:</strong> ${escapeHtml(p.pagamento || '-')}</span>`;
      }

      return `
        <div class="pedido ${p.status === 'cancelado' ? 'cancelado' : ''} ${p.status === 'finalizado' ? 'finalizado' : ''}">
          <div class="pedido-top">
            <span class="pedido-nome">${escapeHtml(p.nome || 'Cliente')}${badge}</span>
            <span class="pedido-total">${total}</span>
          </div>
          <div class="pedido-itens">${escapeHtml(itens)}</div>
          <div class="pedido-meta">
            ${metaHtml}
          </div>
          <div class="pedido-hora mono">${hora}</div>
          ${produtoDigital && p.status === 'lead' ? '<div class="pedido-hora" style="margin-top:2px;">Contato em andamento, ainda não confirmou a compra.</div>' : ''}
          ${produtoDigital && p.status !== 'lead' ? '<div class="pedido-hora" style="margin-top:2px;">Compra informada pelo próprio cliente na conversa, não confirmada via pagamento.</div>' : ''}
          ${acoes}
        </div>
      `;
    }).join('');
  }

  function confirmarExclusao(id) {
    if (confirm('Tem certeza que quer excluir este pedido? Essa ação não pode ser desfeita.')) {
      executarAcao(id, 'excluir');
    }
  }

  // ─── Modal de histórico ───────────────────────────────────────────────────
  document.getElementById('modal-fechar').addEventListener('click', fecharModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) fecharModal();
  });

  function fecharModal() {
    document.getElementById('modal-overlay').classList.remove('aberto');
  }

  async function verConversa(subscriberId, nomeCliente) {
    document.getElementById('modal-titulo').textContent = `Conversa com ${nomeCliente}`;
    document.getElementById('modal-body').innerHTML = '<div style="color:var(--paper-dim);font-size:0.9rem;">Carregando...</div>';
    document.getElementById('modal-overlay').classList.add('aberto');

    try {
      const resp = await fetch(
        `/api/historico?negocio_id=${negocioId}&senha=${encodeURIComponent(senhaAtual)}&subscriber_id=${encodeURIComponent(subscriberId)}`
      );
      if (!resp.ok) { document.getElementById('modal-body').innerHTML = '<div style="color:var(--coral)">Erro ao carregar a conversa.</div>'; return; }

      const data = await resp.json();
      const msgs = data.historico || [];

      if (!msgs.length) {
        document.getElementById('modal-body').innerHTML = '<div style="color:var(--paper-dim);font-size:0.9rem;">Nenhuma mensagem encontrada.</div>';
        return;
      }

      document.getElementById('modal-body').innerHTML = msgs.map(m => {
        const isUser = m.role === 'user';
        const texto = m.parts?.[0]?.text || '';
        // Remove blocos de controle internos da exibição
        const textoLimpo = texto
          .replace(/###PEDIDO###[\s\S]*?###FIM###/g, '')
          .replace(/###LEAD###[\s\S]*?###FIM###/g, '')
          .replace(/###CANCELAR###/g, '')
          .replace(/###CHAMAR_HUMANO###/g, '')
          .replace(/###ENVIAR_CARDAPIO###/g, '')
          .trim();
        if (!textoLimpo) return '';
        return `
          <div class="msg">
            <div class="msg-role ${isUser ? 'user' : 'model'}">${isUser ? 'Cliente' : 'Bot'}</div>
            <div class="msg-texto">${escapeHtml(textoLimpo)}</div>
          </div>`;
      }).join('');
    } catch (err) {
      document.getElementById('modal-body').innerHTML = '<div style="color:var(--coral)">Erro ao carregar a conversa.</div>';
    }
  }

  async function resetarConversa(subscriberId) {
    if (!confirm('Reiniciar a conversa com esse cliente? A IA vai esquecer todo o histórico dessa conversa (os pedidos salvos não são afetados).')) return;
    try {
      const resp = await fetch('/api/pedido-acao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ senha: senhaAtual, negocio_id: negocioId, acao: 'resetar_conversa', subscriberId }),
      });
      if (!resp.ok) { alert('Não foi possível reiniciar a conversa.'); return; }
      alert('Conversa reiniciada.');
    } catch (err) {
      console.error(err);
      alert('Erro ao reiniciar a conversa.');
    }
  }

  async function executarAcao(id, acao) {
    try {
      const resp = await fetch('/api/pedido-acao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ senha: senhaAtual, negocio_id: negocioId, id, acao }),
      });
      if (!resp.ok) {
        alert('Não foi possível atualizar o pedido.');
        return;
      }
      buscarPedidos(senhaAtual);
    } catch (err) {
      console.error(err);
      alert('Erro ao atualizar o pedido.');
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
